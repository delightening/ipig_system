services:
  prometheus:
    image: prom/prometheus:v2.51.0@sha256:5ccad477d0057e62a7cd1981ffcc43785ac10c5a35522dc207466ff7e7ec845f
    container_name: ipig-prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    container_name: ipig-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - backend
    restart: unless-stopped

  # Critical 4：GRAFANA_ADMIN_PASSWORD 必須在 .env 設定，無預設值
  grafana:
    image: grafana/grafana:10.4.0@sha256:f9811e4e687ffecf1a43adb9b64096c50bc0d7a782f8608530f478b6542de7d5
    container_name: ipig-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    external: true
    name: ipig_system_backend

volumes:
  prometheus_data:
  grafana_data:
