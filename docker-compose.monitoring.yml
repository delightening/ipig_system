services:
  prometheus:
    image: prom/prometheus:v2.51.0@sha256:5ccad477d0057e62a7cd1981ffcc43785ac10c5a35522dc207466ff7e7ec845f
    container_name: ipig-prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    container_name: ipig-alertmanager
    # 使用 docker-entrypoint.sh 從環境變數動態渲染設定檔至 /tmp/alertmanager.yml，
    # 避免將 auth_username / auth_password 寫入 committed yaml（資安）。
    entrypoint: ["/bin/sh", "/etc/alertmanager/docker-entrypoint.sh"]
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      # Plan B: ALERT_SMTP_PASSWORD 從 /run/secrets/alert_smtp_password 讀取（見 docker-entrypoint.sh）
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      # R24-3: webhook 共享 token（Bearer），路徑避開 /etc/alertmanager（已 ro 掛載衝突）
      - ./secrets/alertmanager_webhook_token.txt:/run/secrets/webhook_token:ro
      # Plan B: 服務獨立 app password（file-based secret）
      - ./secrets/alert_smtp_password.txt:/run/secrets/alert_smtp_password:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - backend
    restart: unless-stopped

  # Critical 4：GRAFANA_ADMIN_PASSWORD 必須在 .env 設定，無預設值
  grafana:
    image: grafana/grafana:13.0.1
    container_name: ipig-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${GRAFANA_SMTP_USER:-}
      # Plan B: Grafana 原生支援 __FILE 從檔案讀取密碼
      GF_SMTP_PASSWORD__FILE: /run/secrets/grafana_smtp_password
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_USER:-}
    volumes:
      - grafana_data:/var/lib/grafana
      # Plan B: 服務獨立 app password（file-based secret）
      - ./secrets/grafana_smtp_password.txt:/run/secrets/grafana_smtp_password:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    external: true
    name: ipig_system_backend

volumes:
  prometheus_data:
  grafana_data:
