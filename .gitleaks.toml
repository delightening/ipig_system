title = "iPig System — Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "開發用範本值與文件"
regexes = [
    '''CHANGE_THIS''',
    '''your[-_]''',
    '''example\.com''',
    '''ipigsystem\.asia''',
    '''localhost''',
]
paths = [
    '''.env\.example''',
    '''docs/.*''',
    '''.*\.md''',
]
