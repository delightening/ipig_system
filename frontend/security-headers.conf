# 共用安全標頭 snippet
# 由 nginx.conf 透過 `include /etc/nginx/snippets/security-headers.conf;` 載入
# 解決 nginx add_header 繼承問題：子 location 只要有自己的 add_header，
# 就會覆寫 server 層的所有 add_header。改為在每個需要 add_header 的
# location 都 include 本檔，確保安全標頭始終被送出。

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://cloudflareinsights.com https://www.google-analytics.com https://analytics.google.com; frame-ancestors 'none'; report-uri /api/v1/csp-report" always;
# R31-1: Report-Only 並存 — 目標收緊 CSP（移除 'unsafe-eval' + script-src 'unsafe-inline'），僅回報違規不阻擋
# 收一週基準後依 csp_report 表結果決定是否升級為 enforce（見 docs/security/csp-baseline-2026-04.md）
# style-src 仍保留 'unsafe-inline'（238 處 React inline style 為已接受風險，見 R31-13）
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://cloudflareinsights.com https://www.google-analytics.com https://analytics.google.com; frame-ancestors 'none'; report-uri /api/v1/csp-report?mode=ro" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
