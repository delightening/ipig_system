server {
    listen 8080 http2;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 結構化 access log（P1-R4-9）
    access_log /var/log/nginx/access.log json_combined;

    # 隱藏 Nginx 版本號（SEC-16）
    server_tokens off;

    # 安全標頭（SEC-07）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    # SEC-27: Content Security Policy（P0-R4-2: 移除 unsafe-inline，Tailwind 生產建置輸出外部 CSS）
    # Radix UI / shadcn 元件需 inline style（positioning、動畫等），故 style-src 保留 'unsafe-inline'
    # Vite/Rollup 生產建置產生的程式碼使用 eval/Function，需 'unsafe-eval'（已知限制，見 Vite#16749）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://cloudflareinsights.com; frame-ancestors 'none'" always;
    # SEC-37: HSTS（Cloudflare Tunnel 強制 HTTPS，確保瀏覽器不降級）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression（強化壓縮策略）
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/font-woff2 image/svg+xml;

    # Brotli compression（P1-13）
    # 注意：標準 nginx:alpine 可能需要編譯模組，此處先配置以備支援
    brotli on;
    brotli_comp_level 6;
    brotli_static on;
    brotli_types text/plain text/css application/json application/javascript
                 text/xml application/xml application/xml+rss text/javascript
                 application/font-woff2 image/svg+xml;

    # API proxy（含速率限制）
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass ${API_BACKEND_URL};
        client_max_body_size 30m;  # SEC-36: 請求大小限制（配合最大附件 30MB）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 保留 Authorization header 轉發，向後相容 Bearer token（Python 測試/外部 API 用戶端）
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_cache_bypass $http_upgrade;

        # 加大 proxy buffer 以容納包含 JWT 的 Set-Cookie headers（修復 502 Bad Gateway）
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_busy_buffers_size 16k;
    }

    # SEC-35: 禁止直接存取上傳目錄，所有檔案下載必須透過 /api/attachments/:id API
    location /uploads {
        deny all;
        return 403;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets（保留安全標頭）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
