server {
    listen 8080 http2;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 結構化 access log（P1-R4-9）
    access_log /var/log/nginx/access.log json_combined;

    # 隱藏 Nginx 版本號（SEC-16）
    server_tokens off;

    # 安全標頭（SEC-07 / SEC-27 / SEC-37）：用 snippet 避免 nginx add_header 繼承失效
    # 每個 override 了 add_header 的 location 都必須重複 include，否則該 location
    # 的 response 會失去所有 security header（nginx 核心行為）。
    include /etc/nginx/snippets/security-headers.conf;

    # Gzip compression（強化壓縮策略）
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/font-woff2 image/svg+xml;

    # Brotli compression（P1-13）
    # 注意：標準 nginx:alpine 可能需要編譯模組，此處先配置以備支援
    brotli on;
    brotli_comp_level 6;
    brotli_static on;
    brotli_types text/plain text/css application/json application/javascript
                 text/xml application/xml application/xml+rss text/javascript
                 application/font-woff2 image/svg+xml;

    # API proxy（含速率限制）
    location /api {
        include /etc/nginx/snippets/security-headers.conf;
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass ${API_BACKEND_URL};
        client_max_body_size 30m;  # SEC-36: 請求大小限制（配合最大附件 30MB）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 保留 Authorization header 轉發，向後相容 Bearer token（Python 測試/外部 API 用戶端）
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_cache_bypass $http_upgrade;

        # 加大 proxy buffer 以容納包含 JWT 的 Set-Cookie headers（修復 502 Bad Gateway）
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_busy_buffers_size 16k;
    }

    # SEC-35: 禁止直接存取上傳目錄，所有檔案下載必須透過 /api/attachments/:id API
    location /uploads {
        include /etc/nginx/snippets/security-headers.conf;
        deny all;
        return 403;
    }

    # AI agent readiness：明確指定 MIME，避免 SPA fallback 把它們當 HTML 回傳
    location = /robots.txt {
        include /etc/nginx/snippets/security-headers.conf;
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8" always;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/xml;
        add_header Content-Type "application/xml; charset=utf-8" always;
        try_files $uri =404;
    }

    location = /llms.txt {
        include /etc/nginx/snippets/security-headers.conf;
        default_type text/markdown;
        add_header Content-Type "text/markdown; charset=utf-8" always;
        add_header Vary "Accept" always;
        try_files $uri =404;
    }

    location = /.well-known/security.txt {
        include /etc/nginx/snippets/security-headers.conf;
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /.well-known/ {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/json;
        add_header Content-Type "application/json; charset=utf-8" always;
        try_files $uri =404;
    }

    # /openapi.json 代理至後端 utoipa OpenAPI spec
    location = /openapi.json {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass ${API_BACKEND_URL}/api-docs/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Cache-Control "public, max-age=300" always;
    }

    # SPA fallback
    # 對 / 的請求若 Accept 偏好 text/markdown，轉到 llms.txt（content negotiation for AI agents）
    location = / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Vary "Accept" always;
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /llms.txt last;
        }
        try_files /index.html =404;
    }

    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Vary "Accept" always;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets（保留安全標頭）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
