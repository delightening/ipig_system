<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AmendmentsTab RWD Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
  .controls { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
              padding: 16px 20px; margin-bottom: 20px;
              display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn { padding: 5px 11px; border: 1px solid #cbd5e1; border-radius: 6px;
                background: #f8fafc; font-size: 12px; cursor: pointer; color: #334155; }
  .preset-btn.active { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
  input[type=range] { width: 220px; accent-color: #0ea5e9; }
  .width-display { font-size: 13px; font-weight: 700; color: #0ea5e9; min-width: 55px; }
  .mode-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .mode-pc { background: #dcfce7; color: #166534; }
  .mode-tab { background: #fef9c3; color: #854d0e; }
  .mode-mob { background: #fee2e2; color: #991b1b; }

  .viewport-wrap { background: #fff; border: 2px solid #e2e8f0; border-radius: 10px;
                   overflow: hidden; margin: 0 auto;
                   container-type: inline-size; container-name: am;
                   transition: width .2s ease; }

  .am-table-wrap { overflow-x: auto; }
  .am-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 580px; }
  .am-table th, .am-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
  .am-table th { background: #f8fafc; font-size: 12px; font-weight: 600; color: #64748b; }
  .col-no    { width: 95px; white-space: nowrap; font-weight: 500; }
  .col-title { min-width: 140px; }
  .col-type  { width: 85px; }
  .col-stat  { width: 85px; }
  .col-time  { width: 160px; font-size: 12px; color: #64748b; }
  .col-act   { width: 175px; text-align: right !important; }

  @container am (max-width: 739px) {
    .col-tertiary { display: none; }
  }
  @container am (max-width: 599px) {
    .am-table-wrap { display: none; }
    .card-list { display: flex; }
  }
  @container am (min-width: 600px) {
    .card-list { display: none; }
  }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .b-outline { border: 1px solid #cbd5e1; color: #334155; background: #fff; }
  .b-draft   { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
  .b-pending { background: #fef3c7; color: #92400e; }
  .b-approved { background: #dcfce7; color: #166534; }

  .btn-text { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
              border: 1px solid #cbd5e1; border-radius: 6px; background: #fff;
              font-size: 12px; cursor: pointer; color: #334155; }
  .btn-text:hover { background: #f1f5f9; }
  .btn-ghost { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
               border: none; background: transparent; font-size: 12px; cursor: pointer; color: #64748b; }
  .btn-ghost:hover { color: #334155; background: #f1f5f9; border-radius: 6px; }

  .card-list { flex-direction: column; gap: 10px; padding: 12px; }
  .am-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-no { font-size: 13px; font-weight: 600; color: #334155; }
  .card-title { font-size: 13px; color: #475569; margin-bottom: 8px; line-height: 1.5; }
  .card-footer { display: flex; justify-content: space-between; align-items: center;
                 padding-top: 8px; border-top: 1px solid #f1f5f9; }
  .card-buttons { display: flex; gap: 4px; }
</style>
</head>
<body>

<h2 style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:12px;">
  AmendmentsTab — RWD Preview
</h2>

<div class="controls">
  <div>
    <div style="font-size:13px;font-weight:600;color:#475569;">寬度預設</div>
    <div class="presets" style="margin-top:6px;">
      <button class="preset-btn" data-w="375">375</button>
      <button class="preset-btn" data-w="600">600</button>
      <button class="preset-btn" data-w="740">740</button>
      <button class="preset-btn active" data-w="1024">1024</button>
      <button class="preset-btn" data-w="1280">1280</button>
    </div>
  </div>
  <div>
    <div style="font-size:13px;font-weight:600;color:#475569;">拖拉</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
      <input type="range" id="slider" min="300" max="1280" value="1024">
      <span class="width-display" id="wDisplay">1024px</span>
    </div>
  </div>
  <span class="mode-badge mode-pc" id="modeBadge" style="margin-top:auto;">PC 全欄</span>
</div>

<div class="viewport-wrap" id="viewport" style="width:1024px;">

  <div class="am-table-wrap">
    <table class="am-table">
      <thead>
        <tr>
          <th class="col-no">變更編號 ↕</th>
          <th class="col-title">標題</th>
          <th class="col-type">類型 ↕</th>
          <th class="col-stat">狀態 ↕</th>
          <th class="col-time col-tertiary">提交時間 ↕</th>
          <th class="col-act" style="text-align:right">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="col-no">AM-001-002</td>
          <td class="col-title">新增益生菌研究課題與劑量調整</td>
          <td class="col-type"><span class="badge b-outline">主要變更</span></td>
          <td class="col-stat"><span class="badge b-draft">草稿</span></td>
          <td class="col-time col-tertiary">-</td>
          <td class="col-act" style="text-align:right">
            <button class="btn-text">📤 送出</button>
            <button class="btn-ghost">👁 查看</button>
          </td>
        </tr>
        <tr>
          <td class="col-no">AM-001-001</td>
          <td class="col-title">修訂動物使用數量 (30 → 45)</td>
          <td class="col-type"><span class="badge b-outline">次要變更</span></td>
          <td class="col-stat"><span class="badge b-approved">已核准</span></td>
          <td class="col-time col-tertiary">2025/11/20 14:15</td>
          <td class="col-act" style="text-align:right">
            <button class="btn-ghost">👁 查看</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="card-list">
    <div class="am-card">
      <div class="card-header">
        <span class="card-no">AM-001-002</span>
        <span class="badge b-draft">草稿</span>
      </div>
      <div class="card-title">新增益生菌研究課題與劑量調整</div>
      <div class="card-footer">
        <span class="badge b-outline">主要變更</span>
        <div class="card-buttons">
          <button class="btn-text">📤 送出</button>
          <button class="btn-ghost">👁 查看</button>
        </div>
      </div>
    </div>
    <div class="am-card">
      <div class="card-header">
        <span class="card-no">AM-001-001</span>
        <span class="badge b-approved">已核准</span>
      </div>
      <div class="card-title">修訂動物使用數量 (30 → 45)</div>
      <div class="card-footer">
        <span class="badge b-outline">次要變更</span>
        <div class="card-buttons">
          <button class="btn-ghost">👁 查看</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const viewport = document.getElementById('viewport');
  const slider = document.getElementById('slider');
  const wDisplay = document.getElementById('wDisplay');
  const modeBadge = document.getElementById('modeBadge');
  function setWidth(w) {
    const clamped = Math.min(w, window.innerWidth - 48);
    viewport.style.width = clamped + 'px';
    slider.value = clamped; wDisplay.textContent = clamped + 'px';
    if (clamped < 600) { modeBadge.className = 'mode-badge mode-mob'; modeBadge.textContent = '手機 Card'; }
    else if (clamped < 740) { modeBadge.className = 'mode-badge mode-tab'; modeBadge.textContent = '平板 5 欄'; }
    else { modeBadge.className = 'mode-badge mode-pc'; modeBadge.textContent = 'PC 全 6 欄'; }
    document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.w) === w));
  }
  slider.addEventListener('input', () => setWidth(parseInt(slider.value)));
  document.querySelectorAll('.preset-btn').forEach(btn => btn.addEventListener('click', () => setWidth(parseInt(btn.dataset.w))));
  setWidth(1024);
</script>
</body>
</html>
