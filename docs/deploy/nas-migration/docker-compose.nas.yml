# ============================================================
# iPig System — Synology DS925+ NAS Production Compose
# ============================================================
# 使用方式：
#   cd /volume1/docker/ipig
#   docker compose -f docker-compose.nas.yml up -d
#
# 前提：
#   1. 已 docker login ghcr.io
#   2. 已建立 /volume1/docker/ipig/ 目錄結構（見 migration-sop.md）
#   3. 已放置 .env 與 secrets/ 檔案
#   4. Cloudflare Tunnel token 已寫入 secrets/cloudflare_tunnel_token.txt
# ============================================================

services:
  # =========================
  # Cloudflare Tunnel（對外唯一入口）
  # =========================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ipig-cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN_FILE: /run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    networks:
      - frontend
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

  # =========================
  # PostgreSQL Database
  # =========================
  db:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    container_name: ipig-db
    env_file:
      - .env
    secrets:
      - db_password
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-ipig_db}
      POSTGRES_INITDB_ARGS: "--locale=C"
    volumes:
      - /volume1/docker/ipig/data/postgres:/var/lib/postgresql/data
    # NAS 不需要對外開 DB port；如需本機調試可取消註解
    # ports:
    #   - "127.0.0.1:5433:5432"
    networks:
      - database
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ipig_db}" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  # =========================
  # Rust Backend API (GHCR pre-built)
  # =========================
  api:
    image: ghcr.io/${GHCR_OWNER}/ipig-api:${IMAGE_TAG:-latest}
    container_name: ipig-api
    env_file:
      - .env
    secrets:
      - google_service_account
      - jwt_secret
      - db_url
      - smtp_password
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      DATABASE_URL_FILE: /run/secrets/db_url
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_RETRY_ATTEMPTS: ${DATABASE_RETRY_ATTEMPTS:-10}
      DATABASE_RETRY_DELAY_SECONDS: ${DATABASE_RETRY_DELAY_SECONDS:-3}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-360}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@erp.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-iPig System}
      APP_URL: ${APP_URL}
      GEOIP_DB_PATH: /app/geoip/GeoLite2-City.mmdb
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      UPLOAD_DIR: /app/uploads
      SEED_DEV_USERS: "false"
      TRUST_PROXY_HEADERS: "true"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DISABLE_ACCOUNT_LOCKOUT: "false"
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google_service_account
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      ALLOWED_CLOCK_IP_RANGES: ${ALLOWED_CLOCK_IP_RANGES:-}
      CLOCK_OFFICE_LATITUDE: ${CLOCK_OFFICE_LATITUDE:-}
      CLOCK_OFFICE_LONGITUDE: ${CLOCK_OFFICE_LONGITUDE:-}
      CLOCK_GPS_RADIUS_METERS: ${CLOCK_GPS_RADIUS_METERS:-200}
      GOTENBERG_URL: http://gotenberg:3000
      IMAGE_PROCESSOR_URL: http://image-processor:3100
    # NAS 不需要對外開 API port，由 web (nginx) 反向代理
    # ports:
    #   - "127.0.0.1:8000:8000"
    volumes:
      - /volume1/docker/ipig/data/uploads:/app/uploads
      - /volume1/docker/ipig/config/geoip:/app/geoip:ro
    healthcheck:
      test: [ "CMD", "/app/healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # =========================
  # React Frontend (GHCR pre-built, nginx)
  # =========================
  web:
    image: ghcr.io/${GHCR_OWNER}/ipig-web:${IMAGE_TAG:-latest}
    container_name: ipig-web
    # Tunnel 直連 web:8080，不需要 host port mapping
    # 如需 NAS 本機瀏覽可取消註解
    # ports:
    #   - "127.0.0.1:8080:8080"
    environment:
      API_BACKEND_URL: http://api:8000
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend
    depends_on:
      - api
    restart: unless-stopped

  # =========================
  # Gotenberg (PDF)
  # =========================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ipig-gotenberg
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=60s"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # =========================
  # Image Processor
  # =========================
  image-processor:
    image: ghcr.io/${GHCR_OWNER}/ipig-image-processor:${IMAGE_TAG:-latest}
    container_name: ipig-image-processor
    environment:
      PORT: "3100"
      MAX_IMAGE_SIZE_MB: "30"
      MAX_PIXELS: "100000000"
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3100/health || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # =========================
  # Prometheus
  # =========================
  prometheus:
    image: prom/prometheus:v2.51.0@sha256:5ccad477d0057e62a7cd1981ffcc43785ac10c5a35522dc207466ff7e7ec845f
    container_name: ipig-prometheus
    volumes:
      - /volume1/docker/ipig/config/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    # 如需從 NAS 本機存取可取消註解
    # ports:
    #   - "127.0.0.1:9090:9090"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # =========================
  # AlertManager
  # =========================
  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    container_name: ipig-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
    volumes:
      - /volume1/docker/ipig/config/alertmanager:/etc/alertmanager:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # =========================
  # Grafana
  # =========================
  grafana:
    image: grafana/grafana:10.4.0@sha256:f9811e4e687ffecf1a43adb9b64096c50bc0d7a782f8608530f478b6542de7d5
    container_name: ipig-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - /volume1/docker/ipig/config/grafana/provisioning:/etc/grafana/provisioning:ro
      - /volume1/docker/ipig/config/grafana/dashboards/ipig-overview.json:/var/lib/grafana/dashboards/ipig-overview.json:ro
    # 如需從 Tunnel 對外或 NAS 本機存取可取消註解
    # ports:
    #   - "127.0.0.1:3001:3000"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # =========================
  # DB Backup
  # =========================
  db-backup:
    image: ghcr.io/${GHCR_OWNER}/ipig-db-backup:${IMAGE_TAG:-latest}
    container_name: ipig-db-backup
    env_file:
      - .env
    secrets:
      - db_password
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ipig_db}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGHOST: db
      PGPORT: "5432"
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      RSYNC_TARGET: ${RSYNC_TARGET:-}
      BACKUP_ON_START: ${BACKUP_ON_START:-false}
      BACKUP_REQUIRE_ENCRYPTION: "true"
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
    volumes:
      - /volume1/docker/ipig/data/backups:/backups
      - /volume1/docker/ipig/data/uploads:/uploads:ro
    networks:
      - database
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # =========================
  # Watchtower (auto-update)
  # =========================
  watchtower:
    image: containrrr/watchtower:latest@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: ipig-watchtower
    secrets:
      - watchtower_api_token
      - watchtower_smtp_password
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker/ipig/config/watchtower-entrypoint.sh:/entrypoint.sh:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: 3600
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_METRICS: "true"
      WATCHTOWER_NOTIFICATIONS: "email"
      WATCHTOWER_NOTIFICATION_EMAIL_FROM: ${SMTP_FROM_EMAIL:-noreply@erp.local}
      WATCHTOWER_NOTIFICATION_EMAIL_TO: ${DEPLOY_NOTIFY_EMAIL:-}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER: ${SMTP_HOST:-}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: ${SMTP_PORT:-587}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER: ${SMTP_USERNAME:-}
      WATCHTOWER_NOTIFICATION_EMAIL_DELAY: 2
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: unless-stopped

# =========================
# Networks
# =========================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge

# =========================
# Secrets
# =========================
secrets:
  cloudflare_tunnel_token:
    file: ./secrets/cloudflare_tunnel_token.txt
  google_service_account:
    file: ./secrets/google-service-account.json
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  db_url:
    file: ./secrets/db_url.txt
  db_password:
    file: ./secrets/db_password.txt
  smtp_password:
    file: ./secrets/smtp_password.txt
  watchtower_api_token:
    file: ./secrets/watchtower_api_token.txt
  watchtower_smtp_password:
    file: ./secrets/watchtower_smtp_password.txt

# =========================
# Volumes (僅 prometheus/grafana 用 named volume，其餘改 bind mount)
# =========================
volumes:
  prometheus_data:
  grafana_data:
