<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>VetRecommendationsTab RWD Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
  .controls { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
              padding: 16px 20px; margin-bottom: 20px;
              display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn { padding: 5px 11px; border: 1px solid #cbd5e1; border-radius: 6px;
                background: #f8fafc; font-size: 12px; cursor: pointer; color: #334155; }
  .preset-btn.active { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
  input[type=range] { width: 220px; accent-color: #0ea5e9; }
  .width-display { font-size: 13px; font-weight: 700; color: #0ea5e9; min-width: 55px; }
  .mode-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .mode-table { background: #dcfce7; color: #166534; }
  .mode-card { background: #fee2e2; color: #991b1b; }

  .viewport-wrap { background: #fff; border: 2px solid #e2e8f0; border-radius: 10px;
                   overflow: hidden; margin: 0 auto;
                   container-type: inline-size; container-name: vr;
                   transition: width .2s ease; }

  .vr-table-wrap { overflow-x: auto; }
  .vr-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 440px; }
  .vr-table th, .vr-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f1f5f9;
                               vertical-align: top; }
  .vr-table th { background: #f8fafc; font-size: 12px; font-weight: 600; color: #64748b; }
  .col-date { width: 120px; white-space: nowrap; font-weight: 500; }
  .col-obs  { min-width: 120px; white-space: pre-wrap; }
  .col-sug  { min-width: 120px; white-space: pre-wrap; }
  .col-act  { width: 80px; }

  @container vr (max-width: 599px) {
    .vr-table-wrap { display: none; }
    .card-list { display: flex; }
  }
  @container vr (min-width: 600px) {
    .card-list { display: none; }
  }

  .icon-btn { padding: 4px; background: transparent; border: none; cursor: pointer;
              color: #64748b; border-radius: 4px; }
  .icon-btn:hover { background: #f1f5f9; color: #334155; }
  .icon-btn.del:hover { background: #fef2f2; color: #ef4444; }

  .card-list { flex-direction: column; gap: 10px; padding: 12px; }
  .vr-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; background: #fff; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-date { font-size: 13px; font-weight: 600; color: #334155; }
  .card-section { margin-bottom: 8px; }
  .card-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
  .card-text { font-size: 13px; color: #475569; white-space: pre-wrap; line-height: 1.5; }
</style>
</head>
<body>

<h2 style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:12px;">
  VetRecommendationsTab — RWD Preview
</h2>

<div class="controls">
  <div>
    <div style="font-size:13px;font-weight:600;color:#475569;">寬度預設</div>
    <div class="presets" style="margin-top:6px;">
      <button class="preset-btn" data-w="375">375</button>
      <button class="preset-btn" data-w="600">600</button>
      <button class="preset-btn active" data-w="960">960</button>
      <button class="preset-btn" data-w="1280">1280</button>
    </div>
  </div>
  <div>
    <div style="font-size:13px;font-weight:600;color:#475569;">拖拉</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
      <input type="range" id="slider" min="300" max="1280" value="960">
      <span class="width-display" id="wDisplay">960px</span>
    </div>
  </div>
  <span class="mode-badge mode-table" id="modeBadge" style="margin-top:auto;">表格</span>
</div>

<div class="viewport-wrap" id="viewport" style="width:960px;">

  <div class="vr-table-wrap">
    <table class="vr-table">
      <thead>
        <tr>
          <th class="col-date">日期 ↕</th>
          <th class="col-obs">觀察</th>
          <th class="col-sug">建議處置</th>
          <th class="col-act">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="col-date">2025/12/15</td>
          <td class="col-obs">食慾正常，傷口癒合良好，無異常分泌物。呼吸平穩。</td>
          <td class="col-sug">繼續觀察，持續 Meloxicam 0.4mg/kg PO QD，3 天後回診。</td>
          <td class="col-act">
            <button class="icon-btn" title="編輯">✏️</button>
            <button class="icon-btn del" title="刪除">🗑</button>
          </td>
        </tr>
        <tr>
          <td class="col-date">2025/12/12</td>
          <td class="col-obs">術後第一天，無異常。</td>
          <td class="col-sug">照常給藥，注意進食狀況。</td>
          <td class="col-act">
            <button class="icon-btn">✏️</button>
            <button class="icon-btn del">🗑</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="card-list">
    <div class="vr-card">
      <div class="card-header">
        <span class="card-date">2025/12/15</span>
        <div>
          <button class="icon-btn">✏️</button>
          <button class="icon-btn del">🗑</button>
        </div>
      </div>
      <div class="card-section">
        <div class="card-label">觀察</div>
        <div class="card-text">食慾正常，傷口癒合良好，無異常分泌物。呼吸平穩。</div>
      </div>
      <div class="card-section">
        <div class="card-label">建議處置</div>
        <div class="card-text">繼續觀察，持續 Meloxicam 0.4mg/kg PO QD，3 天後回診。</div>
      </div>
    </div>
  </div>

</div>

<script>
  const viewport = document.getElementById('viewport');
  const slider = document.getElementById('slider');
  const wDisplay = document.getElementById('wDisplay');
  const modeBadge = document.getElementById('modeBadge');
  function setWidth(w) {
    const clamped = Math.min(w, window.innerWidth - 48);
    viewport.style.width = clamped + 'px';
    slider.value = clamped; wDisplay.textContent = clamped + 'px';
    if (clamped < 600) { modeBadge.className = 'mode-badge mode-card'; modeBadge.textContent = '手機 Card'; }
    else { modeBadge.className = 'mode-badge mode-table'; modeBadge.textContent = '表格'; }
    document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.w) === w));
  }
  slider.addEventListener('input', () => setWidth(parseInt(slider.value)));
  document.querySelectorAll('.preset-btn').forEach(btn => btn.addEventListener('click', () => setWidth(parseInt(btn.dataset.w))));
  setWidth(960);
</script>
</body>
</html>
