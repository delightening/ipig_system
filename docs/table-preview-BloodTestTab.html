<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloodTestTab RWD Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }

  .controls {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 16px 20px; margin-bottom: 20px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  }
  .controls label { font-size: 13px; font-weight: 600; color: #475569; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn {
    padding: 5px 11px; border: 1px solid #cbd5e1; border-radius: 6px;
    background: #f8fafc; font-size: 12px; cursor: pointer; color: #334155;
  }
  .preset-btn:hover { background: #e0f2fe; border-color: #38bdf8; }
  .preset-btn.active { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
  input[type=range] { width: 220px; accent-color: #0ea5e9; }
  .width-display { font-size: 13px; font-weight: 700; color: #0ea5e9; min-width: 55px; }
  .mode-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .mode-table { background: #dcfce7; color: #166534; }
  .mode-card  { background: #fee2e2; color: #991b1b; }

  .viewport-wrap {
    background: #fff; border: 2px solid #e2e8f0; border-radius: 10px;
    overflow: hidden; margin: 0 auto;
    container-type: inline-size; container-name: bt;
    transition: width .2s ease;
  }

  /* Ruler */
  .ruler { display: flex; height: 16px; border-radius: 4px; overflow: hidden;
            font-size: 9px; font-weight: 600; margin-bottom: 8px; }

  /* Table */
  .bt-table-wrap { overflow-x: auto; }
  .bt-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 365px; }
  .bt-table th, .bt-table td {
    padding: 10px 14px; text-align: left;
    border-bottom: 1px solid #f1f5f9;
  }
  .bt-table th { background: #f8fafc; font-size: 12px; font-weight: 600; color: #64748b; }
  .bt-table tr:hover td { background: #f8fafc; }
  .col-date    { width: 100px; }
  .col-lab     { width: 130px; }
  .col-count   { width: 70px; text-align: center !important; }
  .col-abnorm  { width: 85px; text-align: center !important; }
  .col-creator { width: 100px; }
  .col-actions { width: 110px; text-align: right !important; }

  /* @container: hide table, show cards below 600px */
  @container bt (max-width: 599px) {
    .bt-table-wrap { display: none; }
    .card-list { display: flex; }
  }
  @container bt (min-width: 600px) {
    .card-list { display: none; }
  }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-ok  { color: #166534; }
  .badge-err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  /* Action buttons */
  .action-btn {
    width: 30px; height: 30px; border: none; border-radius: 6px;
    background: transparent; cursor: pointer; font-size: 14px;
  }
  .action-btn:hover { background: #f1f5f9; }
  .action-btn.del { color: #ef4444; }

  /* Cards */
  .card-list { flex-direction: column; gap: 10px; padding: 12px; }
  .bt-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; background: #fff; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-date { font-size: 13px; font-weight: 600; color: #334155; }
  .card-lab  { font-size: 12px; color: #64748b; }
  .card-stats { display: flex; gap: 12px; font-size: 13px; color: #475569; margin-bottom: 8px; }
  .card-footer { display: flex; justify-content: flex-end; gap: 2px; border-top: 1px solid #f1f5f9; padding-top: 8px; }
</style>
</head>
<body>

<h2 style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:12px;">
  BloodTestTab — RWD Preview
</h2>

<div class="controls">
  <div>
    <label>寬度預設</label>
    <div class="presets" style="margin-top:6px;">
      <button class="preset-btn" data-w="375">375px<br><span style="font-size:10px;color:#94a3b8">手機</span></button>
      <button class="preset-btn" data-w="600">600px<br><span style="font-size:10px;color:#94a3b8">斷點</span></button>
      <button class="preset-btn active" data-w="768">768px<br><span style="font-size:10px;color:#94a3b8">平板</span></button>
      <button class="preset-btn" data-w="1024">1024px<br><span style="font-size:10px;color:#94a3b8">PC</span></button>
      <button class="preset-btn" data-w="1280">1280px<br><span style="font-size:10px;color:#94a3b8">寬螢幕</span></button>
    </div>
  </div>
  <div>
    <label>拖拉調整</label>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
      <input type="range" id="slider" min="300" max="1280" value="768">
      <span class="width-display" id="wDisplay">768px</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:auto;">
    <span class="mode-badge mode-table" id="modeBadge">表格模式</span>
  </div>
</div>

<div style="max-width:1280px;margin:0 auto 8px;padding:0 2px;">
  <div class="ruler">
    <div style="width:calc(600/1280*100%);background:#fee2e2;display:flex;align-items:center;justify-content:center;color:#991b1b;">Card &lt;600</div>
    <div style="background:#dcfce7;flex:1;display:flex;align-items:center;justify-content:center;color:#166534;">表格全欄 ≥600 (595px)</div>
  </div>
</div>

<div class="viewport-wrap" id="viewport" style="width:768px;">

  <!-- Table -->
  <div class="bt-table-wrap">
    <table class="bt-table">
      <thead>
        <tr>
          <th class="col-date">檢查日期 ↕</th>
          <th class="col-lab">檢驗機構 ↕</th>
          <th class="col-count" style="text-align:center">項目數</th>
          <th class="col-abnorm" style="text-align:center">異常項目</th>
          <th class="col-creator">建立者</th>
          <th class="col-actions" style="text-align:right">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="col-date">2026/01/15</td>
          <td class="col-lab">台大動物醫院</td>
          <td class="col-count" style="text-align:center">8</td>
          <td class="col-abnorm" style="text-align:center"><span class="badge badge-err">⚠ 2</span></td>
          <td class="col-creator">林研究員</td>
          <td class="col-actions" style="text-align:right">
            <button class="action-btn">👁</button>
            <button class="action-btn">✏️</button>
            <button class="action-btn del">🗑</button>
          </td>
        </tr>
        <tr>
          <td class="col-date">2025/12/10</td>
          <td class="col-lab">國立獸醫所</td>
          <td class="col-count" style="text-align:center">12</td>
          <td class="col-abnorm" style="text-align:center"><span class="badge-ok">0</span></td>
          <td class="col-creator">實習生-余姿儀</td>
          <td class="col-actions" style="text-align:right">
            <button class="action-btn">👁</button>
            <button class="action-btn">✏️</button>
            <button class="action-btn del">🗑</button>
          </td>
        </tr>
        <tr>
          <td class="col-date">2025/11/05</td>
          <td class="col-lab">-</td>
          <td class="col-count" style="text-align:center">6</td>
          <td class="col-abnorm" style="text-align:center"><span class="badge badge-err">⚠ 1</span></td>
          <td class="col-creator">林研究員</td>
          <td class="col-actions" style="text-align:right">
            <button class="action-btn">👁</button>
            <button class="action-btn">✏️</button>
            <button class="action-btn del">🗑</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Cards -->
  <div class="card-list">
    <div class="bt-card">
      <div class="card-header">
        <span class="card-date">2026/01/15</span>
        <span class="card-lab">台大動物醫院</span>
      </div>
      <div class="card-stats">
        <span>8 項目</span>
        <span class="badge badge-err">⚠ 2 異常</span>
      </div>
      <div class="card-footer">
        <button class="action-btn">👁</button>
        <button class="action-btn">✏️</button>
        <button class="action-btn del">🗑</button>
      </div>
    </div>
    <div class="bt-card">
      <div class="card-header">
        <span class="card-date">2025/12/10</span>
        <span class="card-lab">國立獸醫所</span>
      </div>
      <div class="card-stats">
        <span>12 項目</span>
        <span class="badge-ok" style="font-size:12px">✅ 全部正常</span>
      </div>
      <div class="card-footer">
        <button class="action-btn">👁</button>
        <button class="action-btn">✏️</button>
        <button class="action-btn del">🗑</button>
      </div>
    </div>
  </div>

</div>

<script>
  const viewport = document.getElementById('viewport');
  const slider   = document.getElementById('slider');
  const wDisplay = document.getElementById('wDisplay');
  const modeBadge = document.getElementById('modeBadge');

  function setWidth(w) {
    const clamped = Math.min(w, window.innerWidth - 48);
    viewport.style.width = clamped + 'px';
    slider.value = clamped;
    wDisplay.textContent = clamped + 'px';
    if (clamped < 600) {
      modeBadge.className = 'mode-badge mode-card';
      modeBadge.textContent = '手機 Card';
    } else {
      modeBadge.className = 'mode-badge mode-table';
      modeBadge.textContent = '表格全欄';
    }
    document.querySelectorAll('.preset-btn').forEach(btn =>
      btn.classList.toggle('active', parseInt(btn.dataset.w) === w));
  }

  slider.addEventListener('input', () => setWidth(parseInt(slider.value)));
  document.querySelectorAll('.preset-btn').forEach(btn =>
    btn.addEventListener('click', () => setWidth(parseInt(btn.dataset.w))));

  setWidth(768);
</script>
</body>
</html>
