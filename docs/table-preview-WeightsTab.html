<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>WeightsTab RWD Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
  .controls { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
              padding: 16px 20px; margin-bottom: 20px;
              display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn { padding: 5px 11px; border: 1px solid #cbd5e1; border-radius: 6px;
                background: #f8fafc; font-size: 12px; cursor: pointer; color: #334155; }
  .preset-btn.active { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
  input[type=range] { width: 220px; accent-color: #0ea5e9; }
  .width-display { font-size: 13px; font-weight: 700; color: #0ea5e9; min-width: 55px; }
  .mode-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .mode-pc { background: #dcfce7; color: #166534; }
  .mode-tab { background: #fef9c3; color: #854d0e; }
  .mode-mob { background: #fee2e2; color: #991b1b; }

  .viewport-wrap { background: #fff; border: 2px solid #e2e8f0; border-radius: 10px;
                   overflow: hidden; margin: 0 auto;
                   container-type: inline-size; container-name: wt;
                   transition: width .2s ease; }

  .wt-table-wrap { overflow-x: auto; }
  .wt-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 380px; }
  .wt-table th, .wt-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
  .wt-table th { background: #f8fafc; font-size: 12px; font-weight: 600; color: #64748b; }
  .col-sys  { width: 80px; font-family: monospace; font-size: 11px; color: #94a3b8; }
  .col-date { width: 100px; white-space: nowrap; }
  .col-wt   { width: 90px; font-weight: 500; }
  .col-crt  { width: 100px; }
  .col-time { width: 160px; font-size: 12px; color: #64748b; }
  .col-act  { width: 90px; text-align: right !important; }

  @container wt (max-width: 619px) {
    .col-tertiary { display: none; }
  }
  @container wt (max-width: 599px) {
    .wt-table-wrap { display: none; }
    .card-list { display: flex; }
  }
  @container wt (min-width: 600px) {
    .card-list { display: none; }
  }

  .icon-btn { width: 32px; height: 32px; border: none; border-radius: 6px;
              background: transparent; cursor: pointer; font-size: 13px; }
  .icon-btn:hover { background: #f1f5f9; }
  .icon-btn.del { color: #ef4444; }

  .card-list { flex-direction: column; gap: 10px; padding: 12px; }
  .wt-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; }
  .card-date { font-size: 12px; color: #64748b; margin-bottom: 2px; }
  .card-wt { font-size: 18px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center;
                 padding-top: 6px; border-top: 1px solid #f1f5f9; }
  .card-crt { font-size: 12px; color: #64748b; }
</style>
</head>
<body>

<h2 style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:12px;">
  WeightsTab — RWD Preview <span style="font-size:12px;color:#64748b;font-weight:400;">(dev mode)</span>
</h2>

<div class="controls">
  <div>
    <div style="font-size:13px;font-weight:600;color:#475569;">寬度預設</div>
    <div class="presets" style="margin-top:6px;">
      <button class="preset-btn" data-w="375">375</button>
      <button class="preset-btn" data-w="600">600</button>
      <button class="preset-btn" data-w="620">620</button>
      <button class="preset-btn active" data-w="960">960</button>
      <button class="preset-btn" data-w="1280">1280</button>
    </div>
  </div>
  <div>
    <div style="font-size:13px;font-weight:600;color:#475569;">拖拉</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
      <input type="range" id="slider" min="300" max="1280" value="960">
      <span class="width-display" id="wDisplay">960px</span>
    </div>
  </div>
  <span class="mode-badge mode-pc" id="modeBadge" style="margin-top:auto;">PC 全欄</span>
</div>

<div class="viewport-wrap" id="viewport" style="width:960px;">

  <div class="wt-table-wrap">
    <table class="wt-table">
      <thead>
        <tr>
          <th class="col-sys col-tertiary">系統號</th>
          <th class="col-date">測量日期 ↕</th>
          <th class="col-wt">體重 (kg) ↕</th>
          <th class="col-crt">記錄者</th>
          <th class="col-time col-tertiary">建立時間 ↕</th>
          <th class="col-act" style="text-align:right">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="col-sys col-tertiary">#1024</td>
          <td class="col-date">2025/12/15</td>
          <td class="col-wt">45.2</td>
          <td class="col-crt">余姿儀</td>
          <td class="col-time col-tertiary">2025/12/15 09:30</td>
          <td class="col-act" style="text-align:right">
            <button class="icon-btn">✏️</button>
            <button class="icon-btn del">🗑</button>
          </td>
        </tr>
        <tr>
          <td class="col-sys col-tertiary">#1015</td>
          <td class="col-date">2025/11/20</td>
          <td class="col-wt">42.8</td>
          <td class="col-crt">林研究員</td>
          <td class="col-time col-tertiary">2025/11/20 14:15</td>
          <td class="col-act" style="text-align:right">
            <button class="icon-btn">✏️</button>
            <button class="icon-btn del">🗑</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="card-list">
    <div class="wt-card">
      <div class="card-date">2025/12/15</div>
      <div class="card-wt">⚖️ 45.2 kg</div>
      <div class="card-footer">
        <span class="card-crt">余姿儀</span>
        <div><button class="icon-btn">✏️</button><button class="icon-btn del">🗑</button></div>
      </div>
    </div>
    <div class="wt-card">
      <div class="card-date">2025/11/20</div>
      <div class="card-wt">⚖️ 42.8 kg</div>
      <div class="card-footer">
        <span class="card-crt">林研究員</span>
        <div><button class="icon-btn">✏️</button><button class="icon-btn del">🗑</button></div>
      </div>
    </div>
  </div>

</div>

<script>
  const viewport = document.getElementById('viewport');
  const slider = document.getElementById('slider');
  const wDisplay = document.getElementById('wDisplay');
  const modeBadge = document.getElementById('modeBadge');
  function setWidth(w) {
    const clamped = Math.min(w, window.innerWidth - 48);
    viewport.style.width = clamped + 'px';
    slider.value = clamped; wDisplay.textContent = clamped + 'px';
    if (clamped < 600) { modeBadge.className = 'mode-badge mode-mob'; modeBadge.textContent = '手機 Card'; }
    else if (clamped < 620) { modeBadge.className = 'mode-badge mode-tab'; modeBadge.textContent = '平板 4 欄'; }
    else { modeBadge.className = 'mode-badge mode-pc'; modeBadge.textContent = 'PC 全欄'; }
    document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.w) === w));
  }
  slider.addEventListener('input', () => setWidth(parseInt(slider.value)));
  document.querySelectorAll('.preset-btn').forEach(btn => btn.addEventListener('click', () => setWidth(parseInt(btn.dataset.w))));
  setWidth(960);
</script>
</body>
</html>
