# WAF Overlay — OWASP ModSecurity CRS
# 啟用方式: docker compose -f docker-compose.yml -f docker-compose.waf.yml up -d
#
# 架構:  Client → WAF (:443/:80) → web (:80) / api (:8000)
# WAF 使用 OWASP CRS 規則集，偵測 SQL injection、XSS、RCE 等常見攻擊。

services:
  waf:
    image: owasp/modsecurity-crs:4-nginx-alpine-202502090101
    container_name: ipig-waf
    environment:
      # 反向代理目標
      BACKEND: "http://web:80"
      # Paranoia Level (1=低誤報 2=平衡 3=嚴格 4=極嚴)
      PARANOIA: 1
      # Anomaly scoring thresholds
      ANOMALY_INBOUND: 5
      ANOMALY_OUTBOUND: 4
      # 偵測模式 (DetectionOnly=僅記錄不阻擋, On=阻擋)
      MODSEC_RULE_ENGINE: "DetectionOnly"
      # 允許 request body 處理
      MODSEC_REQ_BODY_ACCESS: "On"
      MODSEC_RESP_BODY_ACCESS: "On"
      # 允許的 HTTP methods
      ALLOWED_METHODS: "GET HEAD POST OPTIONS PUT PATCH DELETE"
      # 允許的 Content-Type
      ALLOWED_REQUEST_CONTENT_TYPE: "application/x-www-form-urlencoded|multipart/form-data|text/xml|application/xml|application/soap+xml|application/json|application/octet-stream"
      # 最大 request body (50MB for file uploads)
      MAX_FILE_SIZE: "52428800"
      MAX_NUM_ARGS: "512"
      # 設定伺服器名稱
      SERVER_NAME: "ipig-waf"
      # proxy 設定
      PROXY_SSL: "off"
    ports:
      - "${WAF_PORT:-8443}:8080"
    volumes:
      - ./deploy/waf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ./deploy/waf/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro
    depends_on:
      - web
      - api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
