# iPig System — ModSecurity CRS 排除規則
# 放在 CRS 規則載入之前，避免誤報

# 允許 JSON Content-Type（API 端點全部是 JSON）
SecRule REQUEST_HEADERS:Content-Type "application/json" \
    "id:1000,phase:1,nolog,pass,ctl:requestBodyProcessor=JSON"

# 放寬 request body 限制（預設 128KB，上傳檔案可能更大）
SecRequestBodyLimit 52428800
SecRequestBodyNoFilesLimit 1048576

# 放寬 API 路徑的某些規則（常見誤報）
# 例如: 密碼欄位可能觸發 SQL injection 規則
SecRule REQUEST_URI "@beginsWith /api/auth/" \
    "id:1001,phase:1,nolog,pass,ctl:ruleRemoveTargetById=942100;ARGS:password,ctl:ruleRemoveTargetById=942150;ARGS:password,ctl:ruleRemoveTargetById=942200;ARGS:password"

# TOTP code 欄位不需要 SQL injection 檢查
SecRule REQUEST_URI "@beginsWith /api/auth/2fa/" \
    "id:1002,phase:1,nolog,pass,ctl:ruleRemoveTargetById=942100;ARGS:code"

# High 6: 僅對富文本欄位排除 XSS，不整條路徑關閉（依參數排除）
# 計畫書/觀察/手術等 API 的 content、body、description、notes、comment、rationale 等欄位可能含 HTML
SecRule REQUEST_URI "@rx ^/api/(protocols|observations|surgeries)" \
    "id:1003,phase:2,nolog,pass,ctl:ruleRemoveTargetById=941100;ARGS:content,ARGS:body,ARGS:description,ARGS:notes,ARGS:comment,ARGS:rationale,ARGS:text,ctl:ruleRemoveTargetById=941110;ARGS:content,ARGS:body,ARGS:description,ARGS:notes,ARGS:comment,ARGS:rationale,ARGS:text,ctl:ruleRemoveTargetById=941120;ARGS:content,ARGS:body,ARGS:description,ARGS:notes,ARGS:comment,ARGS:rationale,ARGS:text,ctl:ruleRemoveTargetById=941130;ARGS:content,ARGS:body,ARGS:description,ARGS:notes,ARGS:comment,ARGS:rationale,ARGS:text,ctl:ruleRemoveTargetById=941140;ARGS:content,ARGS:body,ARGS:description,ARGS:notes,ARGS:comment,ARGS:rationale,ARGS:text,ctl:ruleRemoveTargetById=941160;ARGS:content,ARGS:body,ARGS:description,ARGS:notes,ARGS:comment,ARGS:rationale,ARGS:text"

# 檔案上傳端點放寬規則
SecRule REQUEST_URI "@rx /attachments$|/photos$|/import/" \
    "id:1004,phase:1,nolog,pass,ctl:ruleRemoveById=920420"
