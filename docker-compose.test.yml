services:
  # =========================
  # CI Test Database
  # =========================
  db-test:
    image: postgres:16-alpine
    container_name: ipig-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ipig_db_test
      POSTGRES_INITDB_ARGS: "--locale=C"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ipig_db_test" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    # CI 環境不需要永久儲存
    tmpfs:
      - /var/lib/postgresql/data

  # =========================
  # CI Test Backend API
  # =========================
  api-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipig-api-test
    ports:
      - "8000:8080"   # host:container（API 在容器內聽 8080，CI 用 localhost:8000）
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgres://postgres:password@db-test:5432/ipig_db_test
      JWT_SECRET: ci_test_secret_key_fixed
      JWT_EXPIRATION_MINUTES: 60
      SEED_DEV_USERS: "true"                              # 重要：CI 測試需要預設帳號
      DEV_USER_PASSWORD: "ci_test_dev_password_2024"        # E2E 測試需要已知密碼
      ADMIN_INITIAL_PASSWORD: "ci_test_admin_password_2024" # E2E 測試管理員密碼
      CI: "true"                                            # seed.rs 用此判斷是否跳過強制改密
      COOKIE_SECURE: "false"                                # CI 中通常不使用 HTTPS
      CORS_ALLOWED_ORIGINS: "*"
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 5s
      timeout: 5s
      start_period: 45s
      retries: 12
    depends_on:
      db-test:
        condition: service_healthy

  # =========================
  # CI Test Frontend (Static Host)
  # =========================
  web-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipig-web-test
    ports:
      - "8080:80"   # host:container（nginx 聽 80，CI/Playwright 用 localhost:8080）
    environment:
      # 前端編譯時會注入此變數，但在生產環境 Dockerfile 中可能需透過 Nginx 或環境變數替換
      VITE_API_URL: http://api-test:8000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 6
    depends_on:
      api-test:
        condition: service_healthy
