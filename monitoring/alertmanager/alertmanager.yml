global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    # 啟用後填入實際 webhook URL 或 email 設定
    # webhook_configs:
    #   - url: "http://api:3000/api/webhooks/alertmanager"

  - name: "critical"
    # 啟用後填入實際通知方式
    # email_configs:
    #   - to: "admin@example.com"
    #     from: "alertmanager@ipig.system"
    #     smarthost: "smtp.example.com:587"
    #     auth_username: "alertmanager@example.com"
    #     auth_password: "${SMTP_PASSWORD}"
