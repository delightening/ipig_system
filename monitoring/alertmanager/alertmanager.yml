global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

# R24-3: 啟用 webhook 轉發至 ipig_system 內部 API，複用 R22 SecurityNotifier
# 共享 token 請於 api 服務的 ALERTMANAGER_WEBHOOK_TOKEN 環境變數設定。
receivers:
  - name: "default"
    webhook_configs:
      - url: "http://api:8000/api/webhooks/alertmanager"
        send_resolved: false
        http_config:
          # send X-Webhook-Token; value must match api env ALERTMANAGER_WEBHOOK_TOKEN
          authorization:
            type: Bearer
            credentials_file: /run/secrets/webhook_token

  - name: "critical"
    webhook_configs:
      - url: "http://api:8000/api/webhooks/alertmanager"
        send_resolved: false
        http_config:
          authorization:
            type: Bearer
            credentials_file: /run/secrets/webhook_token
