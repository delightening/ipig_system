global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

# 預設：通知功能停用。啟用方式見 monitoring/README.md 或使用 alertmanager.example.yml
receivers:
  - name: "default"
