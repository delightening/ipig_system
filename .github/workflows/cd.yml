name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {} # 允許手動觸發部署

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/ipig-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/ipig-web

jobs:
  # =========================
  # Only deploy if CI passed
  # =========================
  gate:
    name: "Gate: verify CI passed"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - run: echo "CI passed for $SHA"
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}

  # =========================
  # Build and push API image
  # =========================
  build-api:
    name: "Build & Push: API"
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =========================
  # Build and push Web image
  # =========================
  build-web:
    name: "Build & Push: Web"
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =========================
  # Post-deploy summary
  # =========================
  summary:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [gate, build-api, build-web]
    if: always()
    steps:
      - name: Deployment success
        if: ${{ needs.build-api.result == 'success' && needs.build-web.result == 'success' }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to GHCR. Watchtower will auto-deploy." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.API_IMAGE }}\` | \`${{ needs.gate.outputs.sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.WEB_IMAGE }}\` | \`${{ needs.gate.outputs.sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY

      - name: Deployment failed
        if: ${{ needs.build-api.result == 'failure' || needs.build-web.result == 'failure' }}
        run: |
          echo "::error::Image build/push failed. Deployment will NOT proceed."
          echo "## Deployment FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API build: ${{ needs.build-api.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Web build: ${{ needs.build-web.result }}" >> $GITHUB_STEP_SUMMARY
          exit 1
