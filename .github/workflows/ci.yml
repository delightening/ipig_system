name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # =========================
  # 🔒 安全漏洞掃描 (RustSec Advisory DB)
  # =========================
  security-audit:
    name: "🔒 Security: cargo audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-audit-bin

      - name: 安裝 cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: 更新 yanked crates
        working-directory: ./backend
        run: cargo update

      - name: 執行 cargo audit
        working-directory: ./backend
        # RUSTSEC-2023-0071: rsa 時序攻擊（sqlx-mysql 上游依賴，無修復版本）
        # RUSTSEC-2024-0370: proc-macro-error 不維護（utoipa 上游依賴）
        run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2024-0370

  # =========================
  # 🛡️ 供應鏈檢查 (授權/漏洞/來源)
  # =========================
  cargo-deny:
    name: "🛡️ Security: cargo deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 執行 cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: backend/Cargo.toml
          command: check
          arguments: --all-features

  # =========================
  # 🛑 SQL 注入守衛
  # =========================
  sql-injection-guard:
    name: "🛑 Guard: SQL injection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查是否有 format! 拼接 SQL
        working-directory: ./backend
        run: |
          if grep -rn --include="*.rs" -E 'format!\s*\(.*\b(SELECT|INSERT|UPDATE|DELETE|DROP|ALTER)\b' src/; then
            echo "::error::發現潛在的 SQL 注入風險！請使用 sqlx 巨集參數綁定。"
            exit 1
          fi
          echo "✅ 未發現 SQL 注入風險"

  # =========================
  # 🚫 Unsafe 守衛
  # =========================
  unsafe-guard:
    name: "🚫 Guard: unsafe code"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查是否有 unsafe 程式碼
        working-directory: ./backend
        run: |
          if grep -rn --include="*.rs" -E '^\s*unsafe\s' src/; then
            echo "::warning::發現 unsafe 程式碼，請確認是否必要並加上安全文件註解。"
          else
            echo "✅ 未發現 unsafe 程式碼"
          fi

  # =========================
  # Rust 後端：編譯檢查
  # =========================
  backend-check:
    name: "Backend: cargo check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --release

  # =========================
  # Rust 後端：單元測試
  # =========================
  backend-test:
    name: "Backend: cargo test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --verbose

  # =========================
  # Rust 後端：Clippy 靜態分析
  # =========================
  backend-lint:
    name: "Backend: clippy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 快取 Cargo 依賴
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo clippy
        # -D warnings: 所有 clippy 警告視為錯誤
        # -W clippy::unwrap_used: unwrap() 產生警告（不阻擋，漸進式修復）
        run: cargo clippy --all-targets -- -D warnings -W clippy::unwrap_used

  # =========================
  # React 前端：TypeScript 檢查
  # =========================
  frontend-check:
    name: "Frontend: tsc check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安裝依賴
        run: npm ci

      - name: TypeScript 型別檢查
        run: npx tsc --noEmit
