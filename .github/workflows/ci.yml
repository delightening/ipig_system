name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # =========================
  # 🔒 安全漏洞掃描 (RustSec Advisory DB)
  # =========================
  security-audit:
    name: "🔒 Security: cargo audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo bin
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-audit-bin

      - name: 安裝 cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: 更新 yanked crates
        working-directory: ./backend
        run: cargo update

      - name: 執行 cargo audit
        working-directory: ./backend
        # RUSTSEC-2023-0071: rsa 時序攻擊（sqlx-mysql 上游依賴，無修復版本）
        # RUSTSEC-2024-0370: proc-macro-error 不維護（utoipa 上游依賴）
        run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2024-0370

  # =========================
  # 🛡️ 供應鏈檢查 (授權/漏洞/來源)
  # =========================
  cargo-deny:
    name: "🛡️ Security: cargo deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 執行 cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: backend/Cargo.toml
          command: check
          arguments: --all-features
          log-level: "info"

  # =========================
  # 🛑 SQL 注入守衛
  # =========================
  sql-injection-guard:
    name: "🛑 Guard: SQL injection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查是否有 format! 拼接 SQL
        working-directory: ./backend
        run: |
          if grep -rn --include="*.rs" -E 'format!\s*\(.*\b(SELECT|INSERT|UPDATE|DELETE|DROP|ALTER)\b' src/; then
            echo "::error::發現潛在的 SQL 注入風險！請使用 sqlx 巨集參數綁定。"
            exit 1
          fi
          echo "✅ 未發現 SQL 注入風險"

  # =========================
  # 🚫 Unsafe 守衛
  # =========================
  unsafe-guard:
    name: "🚫 Guard: unsafe code"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查是否有 unsafe 程式碼
        working-directory: ./backend
        run: |
          # 允許附帶 // SAFETY: 註解的 unsafe（前一行必須有 // SAFETY: 說明）
          UNSAFE_FILES=$(grep -rn --include="*.rs" -E '^\s*unsafe\s' src/ || true)
          if [ -z "$UNSAFE_FILES" ]; then
            echo "✅ 未發現 unsafe 程式碼"
            exit 0
          fi
          BLOCKED=false
          while IFS= read -r line; do
            FILE=$(echo "$line" | cut -d: -f1)
            LINENO_NUM=$(echo "$line" | cut -d: -f2)
            PREV_LINE=$((LINENO_NUM - 1))
            if [ "$PREV_LINE" -ge 1 ]; then
              PREV_CONTENT=$(sed -n "${PREV_LINE}p" "$FILE")
              if echo "$PREV_CONTENT" | grep -q '// SAFETY:'; then
                echo "✅ $FILE:$LINENO_NUM — unsafe 有 SAFETY 註解，放行"
                continue
              fi
            fi
            echo "::error::$FILE:$LINENO_NUM — 發現未附 // SAFETY: 註解的 unsafe 程式碼"
            BLOCKED=true
          done <<< "$UNSAFE_FILES"
          if [ "$BLOCKED" = true ]; then
            echo "❌ 存在未附 // SAFETY: 註解的 unsafe 程式碼，CI 中止"
            exit 1
          fi

  # =========================
  # Rust 後端：編譯檢查
  # =========================
  backend-check:
    name: "Backend: cargo check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --release --locked

  # =========================
  # Rust 後端：單元測試
  # =========================
  backend-test:
    name: "Backend: cargo test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ipig_db_test
          POSTGRES_INITDB_ARGS: "--locale=C"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/ipig_db_test
      SQLX_OFFLINE: "false"
      ADMIN_EMAIL: admin@ipig.local
      ADMIN_INITIAL_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'iPig$ecure1' }}
      # 避免 login_with_wrong_password_returns_401 因平行測試累積 login_events 導致帳號鎖定（400）
      DISABLE_ACCOUNT_LOCKOUT: "true"

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: 安裝 sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --force

      - name: 執行資料庫遷移
        run: sqlx migrate run

      - name: cargo test
        run: cargo test --locked --verbose -- --test-threads=1

  # =========================
  # Rust 後端：Clippy 靜態分析
  # =========================
  backend-lint:
    name: "Backend: clippy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo clippy
        # -D warnings: 所有 clippy 警告視為錯誤
        # -W clippy::unwrap_used: unwrap() 產生警告（不阻擋，漸進式修復）
        run: cargo clippy --all-targets -- -D warnings -W clippy::unwrap_used

  # =========================
  # 📊 後端：cargo-tarpaulin 行覆蓋率量測
  # 僅針對純單元測試（lib target），不需要資料庫連線
  # 門檻：整體行覆蓋率 ≥ 4%（--lib only，主要測試在 integration tests）
  # =========================
  backend-coverage:
    name: "📊 Backend: coverage (tarpaulin)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tarpaulin-

      - name: 安裝 cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked 2>/dev/null || true

      - name: 執行覆蓋率量測（lib 單元測試，離線模式）
        run: |
          cargo tarpaulin \
            --lib \
            --out Xml \
            --output-dir coverage/ \
            --skip-clean \
            --fail-under 4 \
            --timeout 120 \
            -- --test-threads=1
        continue-on-error: false

      - name: 上傳覆蓋率報告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

  # =========================
  # React 前端：TypeScript 檢查
  # =========================
  frontend-check:
    name: "Frontend: tsc check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安裝依賴
        run: npm ci

      - name: 安裝 Playwright 瀏覽器 (Vitest browser 模式所需)
        run: npx playwright install chromium --with-deps

      - name: TypeScript 型別檢查
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --max-warnings=50

      - name: 單元測試 (Vitest)
        # 不指定 project，直接執行所有 test 檔（unit + storybook）；Playwright 已安裝
        run: npx vitest run

  # =========================
  # 🔒 npm 依賴漏洞掃描
  # =========================
  npm-audit:
    name: "🔒 Security: npm audit"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安裝依賴
        run: npm ci

      - name: npm audit (high/critical)
        run: npm audit --audit-level=high

  # =========================
  # 🐳 容器安全掃描 (Trivy)
  # .trivyignore 內所列 CVE 均經評估，原因與風險見 docs/security-compliance/security.md（例如 CVE-2026-25646），非漏修。
  # =========================
  trivy-scan:
    name: "🐳 Security: Trivy container scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --no-cache --progress=plain -t ipig-api:ci ./backend

      - name: Trivy 掃描後端映像
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "ipig-api:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: "os,library"

      - name: 設定 Node.js (用於前端編譯)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 編譯前端
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Build frontend image
        run: docker build --no-cache --progress=plain -t ipig-web:ci ./frontend

      - name: Trivy 掃描前端映像
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "ipig-web:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: "os,library"

  # =========================
  # 🧪 E2E 整合測試 (Playwright)
  # 流程參照：docs/e2e/FLOW.md
  # 完整說明：docs/e2e/README.md
  # =========================
  e2e-test:
    name: "🧪 E2E: Playwright"
    runs-on: ubuntu-latest
    # 確保基本檢查通過後再跑耗時的 E2E
    needs: [backend-test, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: 設定專案環境變數
        run: cp .env.example .env

      - name: 啟動 Docker 測試環境
        env:
          CI_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          CI_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
          CI_DEV_PASSWORD: ${{ secrets.CI_DEV_PASSWORD }}
        run: |
          docker compose -f docker-compose.test.yml build --progress=plain
          # 使用 --wait 等待所有服務 healthcheck 通過，避免 E2E 在服務未就緒時執行
          docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 300

      - name: 傾印容器日誌 (啟動失敗時偵錯)
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml ps -a
          echo ""
          echo "=== API Container Logs (last 200 lines) ==="
          docker compose -f docker-compose.test.yml logs api-test --tail=200
          echo ""
          echo "=== DB Container Logs (last 50 lines) ==="
          docker compose -f docker-compose.test.yml logs db-test --tail=50

      - name: 確認服務可連線 (備援檢查)
        run: |
          # 雙端點一併輪詢，總等待最多 120s，避免 port 映射延遲
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/ > /dev/null && curl -sf http://localhost:8000/api/health > /dev/null; then
              echo "✅ 所有服務已就緒"
              exit 0
            fi
            echo "等待服務... ($i/60)"
            sleep 2
          done
          echo "❌ 服務未在時限內就緒"
          docker compose -f docker-compose.test.yml ps -a
          docker compose -f docker-compose.test.yml logs --tail=80
          exit 1

      - name: 設定 Node.js (執行測試)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安裝 Playwright 依賴
        working-directory: ./frontend
        run: |
          npm ci
          npx playwright install --with-deps

      - name: 執行 Playwright E2E 測試
        working-directory: ./frontend
        env:
          # 須與 docker-compose.test.yml ADMIN_INITIAL_PASSWORD 一致（見 docs/e2e/FLOW.md）
          E2E_BASE_URL: http://localhost:8080
          E2E_USER_EMAIL: admin@ipig.local
          E2E_USER_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci_test_admin_password_for_local' }}
          E2E_ADMIN_EMAIL: admin@ipig.local
          E2E_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci_test_admin_password_for_local' }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci_test_admin_password_for_local' }}
        run: npm run test:e2e

      - name: 上傳測試報告 (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: 停止 Docker 環境
        if: always()
        run: docker compose -f docker-compose.test.yml down
