name: CI

on:
  push:
    # main: 正式釋出
    # integration/**: long-lived 重構 integration branches（例如 integration/r26
    #   收集 Service-driven audit 重構所有 PR，合 main 前需完整 CI 驗證）
    branches:
      - main
      - 'integration/**'
    # docs-only push 跳過整個 CI（治本：所有純文件 PR 不再跑 backend / frontend / Trivy）
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - 'integration/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  # Node.js 20 actions 將於 2026-06-02 強制切換為 Node.js 24，提前 opt-in 避免破壞
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =========================
  # 🔒 安全漏洞掃描 (RustSec Advisory DB)
  # =========================
  security-audit:
    name: "🔒 Security: cargo audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo bin
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-audit-bin

      - name: 安裝 cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: 更新 yanked crates
        working-directory: ./backend
        run: cargo update

      - name: 執行 cargo audit
        working-directory: ./backend
        # RUSTSEC-2023-0071: rsa 時序攻擊（sqlx-mysql 上游依賴，無修復版本）
        # RUSTSEC-2024-0370: proc-macro-error 不維護（utoipa 上游依賴）
        run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2024-0370

  # =========================
  # 🛡️ 供應鏈檢查 (授權/漏洞/來源)
  # =========================
  secret-scan:
    name: "🔑 Security: secret scanning (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: "🛡️ Security: cargo deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 執行 cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: backend/Cargo.toml
          command: check
          arguments: --all-features
          log-level: "info"

  # =========================
  # 🔄 Migration down.sql 守衛 (R30-26)
  # 規則：本 PR 新增的 backend/migrations/NNN_xxx.sql（NNN ≥ 041）必須同步附
  #       backend/migrations/down/NNN_xxx.sql。既有 001-040 在 ignore list，
  #       不回溯補齊（列為 R30-26b backlog）。
  # 撰寫規範：見 backend/migrations/down/README.md
  # =========================
  migration-down-guard:
    name: "🔄 Guard: migration down.sql"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 檢查新 migration 是否附 down.sql
        run: |
          set -euo pipefail
          # 比對範圍：PR base ref（pull_request 事件）或 main（push 事件）
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BASE="origin/main"
          fi
          git fetch origin "${GITHUB_BASE_REF:-main}" --depth=1 || true

          # 既有 migration 豁免清單（version ≤ 040 不回溯補 down）
          MIN_NEW_VERSION=41

          # 找出本 PR 新增的 migration up 檔（不含 down/ 子目錄）
          ADDED=$(git diff --name-only --diff-filter=A "${BASE}...HEAD" \
                  | grep -E '^backend/migrations/[0-9]+_[^/]+\.sql$' || true)

          if [ -z "$ADDED" ]; then
            echo "✅ 本 PR 未新增 migration，跳過"
            exit 0
          fi

          MISSING=""
          for up in $ADDED; do
            base=$(basename "$up" .sql)
            version=$(echo "$base" | grep -oE '^[0-9]+' | sed 's/^0*//')
            if [ -z "$version" ] || [ "$version" -lt "$MIN_NEW_VERSION" ]; then
              echo "⏭  $up (version=$version < $MIN_NEW_VERSION) 為既有 migration 範圍，豁免"
              continue
            fi
            down="backend/migrations/down/${base}.sql"
            if [ ! -f "$down" ]; then
              MISSING="${MISSING}${down}\n"
            else
              echo "✅ $up → $down 配對 OK"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::新 migration 缺少對應的 down.sql："
            printf '::error::  - %b' "$MISSING"
            echo "::error::撰寫規範：backend/migrations/down/README.md"
            echo "::error::範本：backend/migrations/down/TEMPLATE.sql"
            exit 1
          fi
          echo "✅ 所有新 migration 皆附 down.sql"

  # =========================
  # 🛑 SQL 注入守衛
  # =========================
  sql-injection-guard:
    name: "🛑 Guard: SQL injection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查是否有 format! 拼接 SQL
        working-directory: ./backend
        run: |
          if grep -rn --include="*.rs" -E 'format!\s*\(.*\b(SELECT|INSERT|UPDATE|DELETE|DROP|ALTER)\b' src/; then
            echo "::error::發現潛在的 SQL 注入風險！請使用 sqlx 巨集參數綁定。"
            exit 1
          fi
          echo "✅ 未發現 SQL 注入風險"

  # =========================
  # 🔐 R26 Service-driven Audit 守衛
  # 對應 R26_FullPlan.md DoD-5：
  #   防止未來新 PR 在 handler 層引入 `tokio::spawn(async move { AuditService::log_*`
  #   pattern（fire-and-forget audit），這違背 R26 SDD 原則：mutation 與 audit 必須
  #   同 transaction 原子寫入（log_activity_tx），而非 fire-and-forget。
  # 例外（design decision D-15）：
  #   SEC fire-and-forget（FORCE_LOGOUT、IMPERSONATE_START）可用 log_activity_oneshot
  #   ─ 這些事件已發生不可回滾，audit 失敗不應 break 主流程。
  #   handlers/audit.rs::FORCE_LOGOUT、handlers/user.rs::IMPERSONATE_START 為已知例外。
  # =========================
  audit-pattern-guard:
    name: "🔐 Guard: SDD audit pattern"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查 handler 層是否新增 tokio::spawn audit
        working-directory: ./backend
        run: |
          # 已知 SEC fire-and-forget 例外（D-15）：FORCE_LOGOUT + IMPERSONATE_START
          ALLOWED_EXCEPTIONS=2
          # 用 grep -A 15 限制檢查範圍為「tokio::spawn 後 15 行內」，比 awk
          # 的 found-flag 跨 function 持續更可靠（避免下一個函式內的同步
          # audit 呼叫被誤算進去）。
          MATCHES=$(grep -rn -A 15 'tokio::spawn' src/handlers/ 2>/dev/null \
                    | grep 'AuditService::log_activity' || true)
          if [ -z "$MATCHES" ]; then
            ACTUAL_COUNT=0
          else
            ACTUAL_COUNT=$(printf '%s\n' "$MATCHES" | wc -l)
          fi
          echo "Handler 層 tokio::spawn(... AuditService::log_activity*) 呼叫點: ${ACTUAL_COUNT}（容許上限: ${ALLOWED_EXCEPTIONS}）"
          if [ "$ACTUAL_COUNT" -gt "$ALLOWED_EXCEPTIONS" ]; then
            echo "::error::發現新的 tokio::spawn(... AuditService::log_activity*) pattern！"
            echo "::error::R26 SDD 原則: mutation 應改用 log_activity_tx 在同一 tx 寫 audit。"
            echo "::error::SEC fire-and-forget (FORCE_LOGOUT/IMPERSONATE_START) 為已知例外 (D-15)。"
            echo "::error::詳見 docs/plans/R26_FullPlan.md"
            printf '%s\n' "$MATCHES"
            exit 1
          fi
          echo "✅ Handler 層 SDD audit pattern 守則達標"

  # =========================
  # 🔐 Audit Redaction 守衛（R26-14）
  # 對應 docs/security/AUDIT_REDACTION.md：
  #   偵測 models/ 中新增含敏感欄位（password_hash / _secret / _token / api_key /
  #   backup_codes）的 struct，若未在 allowlist 或無明確 `AuditRedact::redacted_fields()`
  #   覆寫則 CI fail。目的：強制新敏感 entity 必須做 redact decision，不得默默用
  #   default 空陣列。
  # =========================
  audit-redaction-guard:
    name: "🔐 Guard: audit redaction"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查敏感欄位 DB entity 的 AuditRedact 覆寫
        working-directory: ./backend
        run: |
          # 掃描含敏感欄位的 struct 名稱，**只**對 DB entity（有 FromRow derive）
          # 檢查。DTO 類（Request/Response）不進 audit diff，跳過。
          #
          # 偵測邏輯：
          #  1. 在 models/ 找所有 struct 含 password_hash / _secret / _token /
          #     api_key / backup_codes / key_hash 欄位
          #  2. 過濾只保留有 `#[derive(..., FromRow, ...)]` 的 struct（= DB entity）
          #  3. 若該 entity 名不在 ALLOWED 中，CI fail 並要求登記 AUDIT_REDACTION.md
          #
          # ALLOWED = 已明確 redact（User / AiApiKey）+ 不進 audit diff 的 entity
          ALLOWED='User|AiApiKey|UserSession|Invitation'

          # 用 find + awk 掃描每個檔案的 struct 區塊（不依賴 shell globstar）
          BAD=$(find src/models -name '*.rs' -type f -print0 | xargs -0 awk '
            /^#\[derive/ {
              is_fromrow = /FromRow/
              next
            }
            /^pub struct / {
              match($0, /pub struct [A-Z][A-Za-z0-9_]+/)
              name = substr($0, RSTART+11, RLENGTH-11)
              in_struct = 1
              has_sensitive = 0
              next
            }
            in_struct && /pub (password_hash|[a-z_]+_secret|[a-z_]+_token|api_key|backup_codes|key_hash) *:/ {
              has_sensitive = 1
            }
            in_struct && /^}/ {
              if (is_fromrow && has_sensitive) print name
              in_struct = 0
              is_fromrow = 0
            }
          ' 2>/dev/null | sort -u | grep -vE "^(${ALLOWED})$" || true)

          if [ -n "$BAD" ]; then
            echo "::error::新增敏感欄位 DB entity 需檢查 AuditRedact::redacted_fields() 覆寫："
            printf '::error::  - %s\n' $BAD
            echo "::error::處理方式："
            echo "::error::  1) 明確覆寫 redacted_fields()，並登記於 docs/security/AUDIT_REDACTION.md §1"
            echo "::error::  2) 若此 entity 不進 audit diff，加入 ci.yml 的 ALLOWED 清單 + §3 登記"
            exit 1
          fi
          echo "✅ 敏感欄位 DB entity 的 AuditRedact 守則達標"

  # =========================
  # 🚫 Unsafe 守衛
  # =========================
  unsafe-guard:
    name: "🚫 Guard: unsafe code"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查是否有 unsafe 程式碼
        working-directory: ./backend
        run: |
          # 允許附帶 // SAFETY: 註解的 unsafe（前一行必須有 // SAFETY: 說明）
          UNSAFE_FILES=$(grep -rn --include="*.rs" -E '^\s*unsafe\s' src/ || true)
          if [ -z "$UNSAFE_FILES" ]; then
            echo "✅ 未發現 unsafe 程式碼"
            exit 0
          fi
          BLOCKED=false
          while IFS= read -r line; do
            FILE=$(echo "$line" | cut -d: -f1)
            LINENO_NUM=$(echo "$line" | cut -d: -f2)
            PREV_LINE=$((LINENO_NUM - 1))
            if [ "$PREV_LINE" -ge 1 ]; then
              PREV_CONTENT=$(sed -n "${PREV_LINE}p" "$FILE")
              if echo "$PREV_CONTENT" | grep -q '// SAFETY:'; then
                echo "✅ $FILE:$LINENO_NUM — unsafe 有 SAFETY 註解，放行"
                continue
              fi
            fi
            echo "::error::$FILE:$LINENO_NUM — 發現未附 // SAFETY: 註解的 unsafe 程式碼"
            BLOCKED=true
          done <<< "$UNSAFE_FILES"
          if [ "$BLOCKED" = true ]; then
            echo "❌ 存在未附 // SAFETY: 註解的 unsafe 程式碼，CI 中止"
            exit 1
          fi

  # =========================
  # Rust 後端：編譯檢查
  # =========================
  backend-check:
    name: "Backend: cargo check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --release --locked

  # =========================
  # Rust 後端：單元測試
  # =========================
  backend-test:
    name: "Backend: cargo test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ipig_db_test
          POSTGRES_INITDB_ARGS: "--locale=C"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/ipig_db_test
      SQLX_OFFLINE: "false"
      ADMIN_EMAIL: admin@ipigsystem.asia
      # H9: 移除 hardcoded fallback，CI_ADMIN_PASSWORD secret 必須設定
      ADMIN_INITIAL_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
      # 避免 login_with_wrong_password_returns_401 因平行測試累積 login_events 導致帳號鎖定（400）
      DISABLE_ACCOUNT_LOCKOUT: "true"

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: 安裝 sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --force

      - name: 執行資料庫遷移
        run: sqlx migrate run

      - name: cargo test
        run: cargo test --locked --verbose -- --test-threads=1

  # =========================
  # Rust 後端：Clippy 靜態分析
  # =========================
  backend-lint:
    name: "Backend: clippy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo clippy
        # -D warnings: 所有 clippy 警告視為錯誤
        # -W clippy::unwrap_used: unwrap() 產生警告（不阻擋，漸進式修復）
        # R26-4 已完成（2026-04-23, PR #188 + #190）：舊版 AuditService::log_activity 已刪除，
        # 不再需要 -A deprecated 容忍標記。新 PR 引入 deprecated 警告會直接 CI 紅燈。
        run: cargo clippy --all-targets -- -D warnings -W clippy::unwrap_used

  # =========================
  # 📊 後端：cargo-tarpaulin 行覆蓋率量測
  # 僅針對純單元測試（lib target），不需要資料庫連線
  # 門檻：整體行覆蓋率 ≥ 4%（--lib only，主要測試在 integration tests）
  # =========================
  backend-coverage:
    name: "📊 Backend: coverage (tarpaulin)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 快取 Cargo 依賴
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tarpaulin-

      - name: 安裝 cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked 2>/dev/null || true

      - name: 執行覆蓋率量測（lib 單元測試，離線模式）
        run: |
          cargo tarpaulin \
            --lib \
            --out Xml \
            --output-dir coverage/ \
            --skip-clean \
            --fail-under 4 \
            --timeout 120 \
            -- --test-threads=1
        continue-on-error: false

      - name: 上傳覆蓋率報告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

  # =========================
  # React 前端：TypeScript 檢查
  # =========================
  frontend-check:
    name: "Frontend: tsc check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: 啟用 pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: 安裝 Playwright 瀏覽器 (Vitest browser 模式所需)
        run: pnpm exec playwright install chromium --with-deps

      - name: TypeScript 型別檢查
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec eslint src --max-warnings=50

      - name: 單元測試 (Vitest)
        # 不指定 project，直接執行所有 test 檔（unit + storybook）；Playwright 已安裝
        run: pnpm exec vitest run

  # =========================
  # 🛡️ Frontend entrypoint script 邊界 case 測試 (R28-6)
  # =========================
  frontend-entrypoint-test:
    name: "🛡️ Frontend: docker-entrypoint.sh"
    runs-on: ubuntu-latest
    # R29-6: tsc fail 時內部 pnpm build 必失敗，short-circuit 省 ~1 分鐘 runner 時間
    needs: [frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: 執行 docker-entrypoint.sh 邊界 case 測試
        working-directory: ./frontend
        run: |
          chmod +x test-entrypoint.sh
          ./test-entrypoint.sh

  # =========================
  # 🔒 pnpm 依賴漏洞掃描
  # =========================
  npm-audit:
    name: "🔒 Security: pnpm audit"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: 啟用 pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high/critical)
        run: pnpm audit --audit-level=high

  # =========================
  # 🐳 容器安全掃描 (Trivy)
  # .trivyignore 內所列 CVE 均經評估，原因與風險見 docs/security-compliance/security.md（例如 CVE-2026-25646），非漏修。
  # =========================
  trivy-scan:
    name: "🐳 Security: Trivy container scan"
    runs-on: ubuntu-latest
    # R29-6: 雙路徑 short-circuit — backend tsc 等同 cargo check 在 backend-check job
    # 已涵蓋；frontend image 內含 pnpm build 在 tsc fail 時必失敗。CI 已知 code 壞時
    # 不再花 ~10 分鐘 build image 跑 Trivy。
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --no-cache --progress=plain -t ipig-api:ci ./backend

      - name: Trivy 掃描後端映像
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ipig-api:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: "os,library"

      - name: 啟用 pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: 設定 Node.js (用於前端編譯)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 編譯前端
        working-directory: ./frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build frontend image
        run: docker build --no-cache --progress=plain -t ipig-web:ci ./frontend

      - name: Trivy 掃描前端映像
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ipig-web:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: "os,library"

  # =========================
  # 🧪 E2E 整合測試 (Playwright)
  # 流程參照：docs/e2e/FLOW.md
  # 完整說明：docs/e2e/README.md
  # =========================
  e2e-test:
    name: "🧪 E2E: Playwright"
    runs-on: ubuntu-latest
    # Dependabot PR 無法取得 repository secrets，Docker 環境必然無法啟動，直接跳過
    if: github.actor != 'dependabot[bot]'
    # 確保基本檢查通過後再跑耗時的 E2E
    needs: [backend-test, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: 設定專案環境變數
        run: cp .env.example .env

      - name: 產生 E2E 測試用 EC JWT 金鑰
        run: |
          mkdir -p secrets
          openssl ecparam -name prime256v1 -genkey -noout | \
            openssl pkcs8 -topk8 -nocrypt -out secrets/jwt_ec_private_key_test.pem
          openssl ec -in secrets/jwt_ec_private_key_test.pem -pubout \
            -out secrets/jwt_ec_public_key_test.pem
          # 將金鑰內容匯出為環境變數，供 docker-compose.test.yml 直接使用
          # （Docker Compose file-based secrets 不支援設定 mode，非 root 容器無法讀取）
          {
            echo "JWT_EC_PRIVATE_KEY<<ECEOF"
            cat secrets/jwt_ec_private_key_test.pem
            echo "ECEOF"
            echo "JWT_EC_PUBLIC_KEY<<ECEOF"
            cat secrets/jwt_ec_public_key_test.pem
            echo "ECEOF"
          } >> "$GITHUB_ENV"

      - name: 啟動 Docker 測試環境 (build)
        env:
          CI_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
          CI_DEV_PASSWORD: ${{ secrets.CI_DEV_PASSWORD }}
          # E2E 覆蓋率：docker-compose.test.yml 透過 ${VITE_E2E_COVERAGE:-0} 讀取，
          # local/dev 預設 0、CI 顯式設 1 → vite 產 hidden source map
          VITE_E2E_COVERAGE: "1"
        run: |
          set -euo pipefail
          echo "=== Docker 版本檢查 ==="
          docker --version && docker compose --version
          echo ""
          echo "=== 開始構建鏡像 ==="
          # --progress=plain 必須放在 compose 層級；放在 build 子命令是 deprecated warning。
          docker compose --progress=plain -f docker-compose.test.yml build

      - name: 啟動 Docker 測試環境 (up)
        env:
          CI_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
          CI_DEV_PASSWORD: ${{ secrets.CI_DEV_PASSWORD }}
        run: |
          set -euo pipefail
          echo "=== 啟動容器（不帶 --wait，手動輪詢 healthcheck） ==="
          # 先 up -d（不 --wait），讓容器啟動；再單獨輪詢 healthcheck，這樣
          # 單一容器啟動失敗時能在失敗當下立刻印日誌，而非 --wait-timeout 才暴露。
          docker compose -f docker-compose.test.yml up -d
          echo ""
          echo "=== 初始容器狀態 ==="
          docker compose -f docker-compose.test.yml ps -a
          echo ""
          echo "=== 輪詢 healthcheck（最多 3 分鐘） ==="
          SERVICES="db-test api-test web-test"
          for i in $(seq 1 36); do
            ALL_HEALTHY=true
            for svc in $SERVICES; do
              cname="ipig-${svc}"
              status=$(docker inspect --format='{{.State.Health.Status}}' "$cname" 2>/dev/null || echo "no-container")
              running=$(docker inspect --format='{{.State.Status}}' "$cname" 2>/dev/null || echo "none")
              if [ "$running" = "exited" ] || [ "$running" = "dead" ]; then
                echo "❌ $cname 已退出 (status=$running)，即將傾印日誌並中止"
                ALL_HEALTHY=false
                break 2
              fi
              if [ "$status" != "healthy" ]; then
                ALL_HEALTHY=false
                if [ $((i % 6)) -eq 0 ]; then
                  echo "  [$i/36] $cname: health=$status, state=$running"
                fi
              fi
            done
            if $ALL_HEALTHY; then
              echo "✅ 所有服務 healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ 180s 後仍有服務未就緒"
          exit 1

      - name: 傾印容器日誌 (啟動失敗時偵錯)
        if: failure()
        run: |
          echo "=== 容器狀態 ==="
          docker compose -f docker-compose.test.yml ps -a || true
          echo ""
          echo "=== API 容器詳細信息 ==="
          docker inspect ipig-api-test 2>/dev/null | jq '.[] | {State, Health, Config}' || true
          echo ""
          echo "=== API 容器日誌 (最後 500 行) ==="
          docker logs ipig-api-test --tail=500 2>&1 || docker compose -f docker-compose.test.yml logs api-test --tail=500
          echo ""
          echo "=== DB 容器日誌 (最後 100 行) ==="
          docker compose -f docker-compose.test.yml logs db-test --tail=100 || true
          echo ""
          echo "=== Web 容器日誌 (最後 100 行) ==="
          docker compose -f docker-compose.test.yml logs web-test --tail=100 || true
          echo ""
          echo "=== Docker 網絡檢查 ==="
          docker network ls || true
          echo ""
          echo "=== Docker 卷檢查 ==="
          docker volume ls | grep ipig || true

      - name: 確認服務可連線 (備援檢查)
        run: |
          # 雙端點一併輪詢，總等待最多 120s，避免 port 映射延遲
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/ > /dev/null && curl -sf http://localhost:8000/api/health > /dev/null; then
              echo "✅ 所有服務已就緒"
              exit 0
            fi
            echo "等待服務... ($i/60)"
            sleep 2
          done
          echo "❌ 服務未在時限內就緒"
          docker compose -f docker-compose.test.yml ps -a
          docker compose -f docker-compose.test.yml logs --tail=80
          exit 1

      - name: 啟用 pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: 設定 Node.js (執行測試)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 安裝 Playwright 依賴
        working-directory: ./frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps

      - name: 執行 Playwright E2E 測試
        working-directory: ./frontend
        env:
          # 須與 docker-compose.test.yml ADMIN_INITIAL_PASSWORD fallback 一致（見 docs/e2e/FLOW.md）
          # docker-compose.test.yml: ${CI_ADMIN_PASSWORD:-ci_test_admin_password_for_local}
          # 若 secret 未設定，兩端皆 fallback 到同一個值，確保密碼一致
          E2E_BASE_URL: http://localhost:8080
          E2E_USER_EMAIL: admin@ipigsystem.asia
          E2E_USER_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci_test_admin_password_for_local' }}
          E2E_ADMIN_EMAIL: admin@ipigsystem.asia
          E2E_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci_test_admin_password_for_local' }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci_test_admin_password_for_local' }}
          # 啟用 V8 coverage：fixtures/coverage.ts 收集，monocart-reporter 聚合 → lcov + html
          E2E_COVERAGE: "1"
        run: pnpm run test:e2e

      - name: 上傳測試報告 (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: 上傳 E2E coverage 報告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-report
          path: frontend/monocart-report/
          retention-days: 30
          if-no-files-found: warn

      - name: 停止 Docker 環境
        if: always()
        run: docker compose -f docker-compose.test.yml down
