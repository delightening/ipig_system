services:
  # =========================
  # PostgreSQL Database
  # =========================
  db:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    container_name: ipig-db
    env_file:
      - .env
    secrets:
      - db_password
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-ipig_db}
      POSTGRES_INITDB_ARGS: "--locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # P0-S2: 僅綁定 localhost，防止外部直連 DB
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    networks:
      - database
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ipig_db}" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  # =========================
  # Rust Backend API
  # =========================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ipig-api
    container_name: ipig-api
    env_file:
      - .env
    secrets:
      - google_service_account
      - jwt_secret
      - db_url
      - smtp_password
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}

      # Production: 密碼由 Docker Secrets 提供
      DATABASE_URL_FILE: /run/secrets/db_url
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password

      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_RETRY_ATTEMPTS: ${DATABASE_RETRY_ATTEMPTS:-10}
      DATABASE_RETRY_DELAY_SECONDS: ${DATABASE_RETRY_DELAY_SECONDS:-3}

      # JWT_EXPIRATION_HOURS 已廢棄，改用下方 JWT_EXPIRATION_MINUTES
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      # SEC-32: 統一使用分鐘級設定
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-360}

      # Email settings（密碼由 secrets 提供）
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@erp.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ERP System}

      APP_URL: ${APP_URL:-http://localhost}

      # GeoIP
      GEOIP_DB_PATH: /app/geoip/GeoLite2-City.mmdb

      # Cookie 安全設定（SEC-02 HttpOnly Cookie）
      # SEC-29: 預設 true
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}

      # Uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      # SEC-29: 預設 false
      SEED_DEV_USERS: ${SEED_DEV_USERS:-false}

      # SEC-30: IP Header 信任策略（反向代理後方設 true）
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      # SEC-31: CORS 允許的 Origin（逗號分隔）
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}

      # 帳號鎖定：設為 true 可關閉 SEC-20 登入失敗鎖定
      DISABLE_ACCOUNT_LOCKOUT: ${DISABLE_ACCOUNT_LOCKOUT:-false}

      # Google Calendar service account
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google_service_account
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}

      # 打卡 IP 白名單（CIDR 格式，逗號分隔，空值=不限制）
      ALLOWED_CLOCK_IP_RANGES: ${ALLOWED_CLOCK_IP_RANGES:-}

      # 打卡 GPS 定位（經緯度 + 允許半徑，空值=不啟用 GPS 驗證）
      CLOCK_OFFICE_LATITUDE: ${CLOCK_OFFICE_LATITUDE:-}
      CLOCK_OFFICE_LONGITUDE: ${CLOCK_OFFICE_LONGITUDE:-}
      CLOCK_GPS_RADIUS_METERS: ${CLOCK_GPS_RADIUS_METERS:-200}

      # Gotenberg PDF 服務
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}

      # Image Processor 微服務（方案 D）
      IMAGE_PROCESSOR_URL: ${IMAGE_PROCESSOR_URL:-http://image-processor:3100}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ${UPLOAD_VOLUME:-./uploads}:/app/uploads
      - ./geoip:/app/geoip:ro
    healthcheck:
      test: [ "CMD", "/app/healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # =========================
  # Seed: 建立訪客帳號（一次性，冪等）
  # =========================
  seed:
    image: ipig-api
    container_name: ipig-seed
    secrets:
      - db_url
    environment:
      DATABASE_URL_FILE: /run/secrets/db_url
    command: ["/app/create_guest"]
    networks:
      - database
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  # =========================
  # React Frontend (Prod build served by nginx)
  # =========================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipig-web
    ports:
      # R17-2: 綁定 localhost，避免意外暴露至外部網路
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    environment:
      # nginx 運行時使用的 API 後端地址
      API_BACKEND_URL: http://api:8000
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend
    depends_on:
      - api
    restart: unless-stopped

  # =========================
  # React Frontend Dev (Vite) — 僅 dev profile 啟用
  # docker compose --profile dev up web-dev
  # =========================
  web-dev:
    image: node:22-alpine
    container_name: ipig-web-dev
    profiles:
      - dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      # R17-2: 綁定 localhost
      - "127.0.0.1:${WEB_DEV_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://api:8000
    command: >
      sh -c "npm install -g npm@latest && npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - frontend
      - backend
    depends_on:
      - api

  # =========================
  # Gotenberg (PDF 生成服務)
  # =========================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ipig-gotenberg
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=60s"
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # =========================
  # Image Processor (圖片處理微服務, 方案 D)
  # =========================
  image-processor:
    build:
      context: ./image-processor
      dockerfile: Dockerfile
    container_name: ipig-image-processor
    environment:
      PORT: "3100"
      MAX_IMAGE_SIZE_MB: "30"
      MAX_PIXELS: "100000000"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3100/health || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # =========================
  # Prometheus (系統監控)
  # =========================
  prometheus:
    image: prom/prometheus:v2.51.0@sha256:5ccad477d0057e62a7cd1981ffcc43785ac10c5a35522dc207466ff7e7ec845f
    container_name: ipig-prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # =========================
  # AlertManager (告警管理)
  # =========================
  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    container_name: ipig-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # =========================
  # Grafana (監控儀表板)
  # =========================
  grafana:
    image: grafana/grafana:10.4.0@sha256:f9811e4e687ffecf1a43adb9b64096c50bc0d7a782f8608530f478b6542de7d5
    container_name: ipig-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana_dashboard.json:/var/lib/grafana/dashboards/ipig-overview.json:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # =========================
  # DB Backup (排程備份)
  # =========================
  db-backup:
    build:
      context: ./scripts/backup
      dockerfile: Dockerfile.backup
    container_name: ipig-db-backup
    env_file:
      - .env
    secrets:
      - db_password
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ipig_db}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGHOST: db
      PGPORT: "5432"
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      RSYNC_TARGET: ${RSYNC_TARGET:-}
      BACKUP_ON_START: ${BACKUP_ON_START:-false}
      BACKUP_REQUIRE_ENCRYPTION: "true"
      # GPG 加密備份（設定收件者 Key ID 或 email，留空則不加密）
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
    volumes:
      - db_backups:/backups
      - ${UPLOAD_VOLUME:-./uploads}:/uploads:ro
    networks:
      - database
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

# =========================
# Networks (P0-S1: 最小權限網路隔離)
# =========================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge

# =========================
# Secrets
# =========================
secrets:
  google_service_account:
    file: ./secrets/google-service-account.json
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  db_url:
    file: ./secrets/db_url.txt
  db_password:
    file: ./secrets/db_password.txt
  smtp_password:
    file: ./secrets/smtp_password.txt

# =========================
# Volumes
# =========================
volumes:
  postgres_data:
  db_backups:
  prometheus_data:
  grafana_data:
