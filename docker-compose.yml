services:
  # =========================
  # PostgreSQL Database
  # =========================
  db:
    image: postgres:16-alpine
    container_name: ipig-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ipig_db}
      POSTGRES_INITDB_ARGS: "--locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # P0-S2: 僅綁定 localhost，防止外部直連 DB
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    networks:
      - database
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ipig_db}" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # =========================
  # Rust Backend API
  # =========================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipig-api
    env_file:
      - .env
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}

      # 後端在 docker 裡，DB host 一律用 service name db，port 用 5432
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ipig_db}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_RETRY_ATTEMPTS: ${DATABASE_RETRY_ATTEMPTS:-10}
      DATABASE_RETRY_DELAY_SECONDS: ${DATABASE_RETRY_DELAY_SECONDS:-3}

      JWT_SECRET: ${JWT_SECRET}
      # JWT_EXPIRATION_HOURS 已廢棄，改用下方 JWT_EXPIRATION_MINUTES
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      # SEC-32: 統一使用分鐘級設定
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-360}

      # Email settings
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@erp.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ERP System}

      APP_URL: ${APP_URL:-http://localhost}

      # GeoIP
      GEOIP_DB_PATH: /app/geoip/GeoLite2-City.mmdb

      # Cookie 安全設定（SEC-02 HttpOnly Cookie）
      # SEC-29: 預設 true，開發環境需手動設為 false
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}

      # Uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      # SEC-29: 預設 false，開發環境需手動設為 true
      SEED_DEV_USERS: ${SEED_DEV_USERS:-false}

      # SEC-30: IP Header 信任策略（反向代理後方設 true）
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      # SEC-31: CORS 允許的 Origin（逗號分隔）
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}

      # Google Calendar service account
      # 你程式端用 Google SDK 或自寫讀檔都可以直接吃這個路徑
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google_service_account
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}

      # 打卡 IP 白名單（CIDR 格式，逗號分隔，空值=不限制）
      ALLOWED_CLOCK_IP_RANGES: ${ALLOWED_CLOCK_IP_RANGES:-}

      # 打卡 GPS 定位（經緯度 + 允許半徑，空值=不啟用 GPS 驗證）
      CLOCK_OFFICE_LATITUDE: ${CLOCK_OFFICE_LATITUDE:-}
      CLOCK_OFFICE_LONGITUDE: ${CLOCK_OFFICE_LONGITUDE:-}
      CLOCK_GPS_RADIUS_METERS: ${CLOCK_GPS_RADIUS_METERS:-200}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${UPLOAD_VOLUME:-./uploads}:/app/uploads
      - ./geoip:/app/geoip:ro
    secrets:
      - google_service_account
    healthcheck:
      test: [ "CMD", "/app/healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # =========================
  # React Frontend (Prod build served by nginx)
  # =========================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipig-web
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      # nginx 運行時使用的 API 後端地址
      API_BACKEND_URL: http://api:8000
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - frontend
      - backend
    depends_on:
      - api
    restart: unless-stopped

  # =========================
  # React Frontend Dev (Vite)
  # =========================
  web-dev:
    image: node:22-alpine
    container_name: ipig-web-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${WEB_DEV_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://api:8000
    command: >
      sh -c "npm install -g npm@latest && npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - frontend
      - backend
    depends_on:
      - api

  # =========================
  # DB Backup (排程備份)
  # =========================
  db-backup:
    build:
      context: ./scripts/backup
      dockerfile: Dockerfile.backup
    container_name: ipig-db-backup
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ipig_db}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: db
      PGPORT: "5432"
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      RSYNC_TARGET: ${RSYNC_TARGET:-}
      BACKUP_ON_START: ${BACKUP_ON_START:-false}
      # GPG 加密備份（設定收件者 Key ID 或 email，留空則不加密）
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
    volumes:
      - db_backups:/backups
      - ${UPLOAD_VOLUME:-./uploads}:/uploads:ro
    networks:
      - database
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

# =========================
# Networks (P0-S1: 最小權限網路隔離)
# =========================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge

# =========================
# Secrets
# =========================
secrets:
  google_service_account:
    file: ./secrets/google-service-account.json

# =========================
# Volumes
# =========================
volumes:
  postgres_data:
  db_backups:
